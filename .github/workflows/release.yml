name: Release Web App

on:
  push:
    tags:
      - 'v*'
  
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  release-web:
    name: Release Web Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      
      - name: Install dependencies
        run: |
          cd mobile
          npm ci --legacy-peer-deps
      
      - name: Setup Expo CLI
        run: npm install -g @expo/cli
      
      - name: Update version
        run: |
          cd mobile
          npm version ${{ github.event.inputs.version || github.ref_name }}
        if: github.event.inputs.version
      
      - name: Build web app for production
        run: |
          cd mobile
          npx expo export --platform web
        env:
          EXPO_PUBLIC_ENV: production
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: mobile/dist
          cname: your-custom-domain.com # optional
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 What's New in ${{ github.ref_name }}
            
            ### Web Application
            - 🌐 **Live Demo**: [https://abdulc123.github.io/FoodTruckFinder](https://abdulc123.github.io/FoodTruckFinder)
            - 📱 **PWA Ready**: Works on all devices
            - 🗺️ **Interactive Maps**: Find food trucks near you
            
            ### Mobile Apps (Local Build)
            - 📱 **Android**: Download APK from workflow artifacts
            - 🍎 **iOS**: Build locally with Xcode
            
            ### Installation
            1. **Web**: Visit the live demo link above
            2. **Mobile**: Use the "Local Mobile Build" workflow to generate APK/IPA
            3. **Development**: `npm start` in the mobile directory
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
