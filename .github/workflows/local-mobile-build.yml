name: Local Mobile Build (No Expo Account)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build for'
        required: true
        default: 'android'
        type: choice
        options:
        - android
        - ios
        - both

jobs:
  build-android:
    name: Build Android APK (Local)
    runs-on: ubuntu-latest
    if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      
      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: |
          cd mobile
          npm ci --legacy-peer-deps
      
      - name: Setup Expo CLI
        run: npm install -g @expo/cli
      
      - name: Prebuild for Android (generates native code)
        run: |
          cd mobile
          npx expo prebuild --platform android --clean
      
      - name: Build Android APK
        run: |
          cd mobile/android
          ./gradlew assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
      
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS App (Local)
    runs-on: macos-latest
    if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Install dependencies
        run: |
          cd mobile
          npm ci --legacy-peer-deps
      
      - name: Setup Expo CLI
        run: npm install -g @expo/cli
      
      - name: Prebuild for iOS (generates native code)
        run: |
          cd mobile
          npx expo prebuild --platform ios --clean
      
      - name: Install CocoaPods
        run: |
          cd mobile/ios
          pod install
      
      - name: Build iOS App
        run: |
          cd mobile/ios
          xcodebuild -workspace mobile.xcworkspace -scheme mobile -configuration Release -destination generic/platform=iOS -archivePath mobile.xcarchive archive
          xcodebuild -exportArchive -archivePath mobile.xcarchive -exportPath ./build -exportOptionsPlist exportOptions.plist
      
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile/ios/build/*.ipa
          retention-days: 30
